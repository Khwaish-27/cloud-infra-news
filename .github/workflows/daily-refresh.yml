name: Daily News Refresh

on:
  schedule:
    - cron: '30 2 * * *'   # runs 2:30am UTC = 8:00am IST every day
  workflow_dispatch:        # allows you to trigger it manually from GitHub too

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: python -m nltk.downloader punkt punkt_tab

      - name: Run pipeline
        run: python run.py

      - name: Commit and push refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/articles.json
          git diff --staged --quiet || git commit -m "Daily refresh $(date -u +%Y-%m-%d)"
          git pull origin main --rebase
          git push
