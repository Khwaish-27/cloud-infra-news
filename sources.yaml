# News sources. All free, no API keys.
# Two kinds:
#   rss_feeds        - direct publisher RSS feeds
#   google_news      - keyword searches via Google News RSS (free, no key)
# Add or remove freely; the pipeline reads this file at runtime.

rss_feeds:
  # --- Security news ---
  - name: "The Hacker News"
    url: "https://feeds.feedburner.com/TheHackersNews"
  - name: "BleepingComputer"
    url: "https://www.bleepingcomputer.com/feed/"
  - name: "Krebs on Security"
    url: "https://krebsonsecurity.com/feed/"
  - name: "Help Net Security"
    url: "https://www.helpnetsecurity.com/feed/"
  - name: "Dark Reading"
    url: "https://www.darkreading.com/rss.xml"
  - name: "SecurityWeek"
    url: "https://feeds.feedburner.com/securityweek"
  - name: "InfoSecurity Magazine"
    url: "https://www.infosecurity-magazine.com/rss/news/"

  # --- Cloud & infrastructure vendor blogs ---
  - name: "AWS News Blog"
    url: "https://aws.amazon.com/blogs/aws/feed/"
  - name: "Microsoft Azure Blog"
    url: "https://azure.microsoft.com/en-us/blog/feed/"
  - name: "Google Cloud Blog"
    url: "https://cloudblog.withgoogle.com/rss/"
  - name: "Cloudflare Blog"
    url: "https://blog.cloudflare.com/rss/"
  - name: "CSO Online"
    url: "https://www.csoonline.com/feed/"

  # --- Data centre & infrastructure ---
  - name: "DataCenterDynamics"
    url: "https://www.datacenterdynamics.com/en/rss/"
  - name: "The Register"
    url: "https://www.theregister.com/headlines.atom"
  - name: "ComputerWeekly"
    url: "https://www.computerweekly.com/rss/All-Computer-Weekly-content.xml"
  - name: "ZDNet"
    url: "https://www.zdnet.com/news/rss.xml"

  # --- Press releases (company announcements, product launches, partnerships) ---
  - name: "PR Newswire - Technology"
    url: "https://www.prnewswire.com/rss/news-releases-list.rss?category=technology"
  - name: "Business Wire - Technology"
    url: "https://www.businesswire.com/rss/home/?rss=G7"
  - name: "GlobeNewswire - Technology"
    url: "https://www.globenewswire.com/RssFeed/subjectcode/32-Information%20Technology"

# Google News keyword searches. The pipeline URL-encodes the 'query' for you.
google_news:
  - name: "Data Centres"
    query: '"data centre" OR "data center" colocation hyperscale'
  - name: "Cloud Infrastructure"
    query: "cloud infrastructure AWS Azure Google Cloud Kubernetes"
  - name: "Cybersecurity"
    query: "cybersecurity breach ransomware vulnerability threat"
  - name: "Networks"
    query: "enterprise networking SD-WAN 5G fiber edge"
  - name: "GRC"
    query: "GRC governance risk compliance regulation audit GDPR DORA"
  - name: "Consulting Firm Announcements"
    query: "Deloitte OR PwC OR Accenture OR EY OR KPMG OR IBM cybersecurity cloud launch partnership"
  - name: "Vendor Press Releases"
    query: "Palo Alto OR CrowdStrike OR Microsoft OR Google OR AWS announces launches expands cloud security"
  - name: "Market & Industry News"
    query: "cloud security market acquisition merger partnership infrastructure deal"

# Google News locale (leave as-is unless you want a different region/language)
google_news_locale: "hl=en-US&gl=US&ceid=US:en"
